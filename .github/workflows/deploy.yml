name: Deploy PyTutor to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deploy at a time; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pytutor/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the contents of the pytutor/ subfolder
          path: ./pytutor

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
